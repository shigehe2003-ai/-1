<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STARBLAST">
<title>STARBLAST</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root{--c:#00f5ff;--p:#ff006e;--y:#ffd60a;--g:#39ff14;--bg:#020010;}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;touch-action:none;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;position:fixed;}
  body{display:flex;flex-direction:column;align-items:center;font-family:'Orbitron',monospace;
    color:var(--c);padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}
  body::after{content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
    pointer-events:none;z-index:200;}

/* HUD */
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;
padding:6px 20px 5px;background:rgba(0,245,255,.04);border-bottom:1px solid rgba(0,245,255,.12);flex-shrink:0;}
.hud-label{font-size:8px;letter-spacing:3px;color:rgba(0,245,255,.4);}
.hud-value{font-size:20px;font-weight:900;color:var(–c);text-shadow:0 0 8px var(–c);letter-spacing:1px;}
#lives-display{display:flex;gap:5px;align-items:center;}
.life-icon{width:16px;height:16px;fill:var(–p);filter:drop-shadow(0 0 3px var(–p));}
.life-icon.dead{opacity:.12;}
/* Ally counter badge */
#ally-hud{font-size:11px;font-weight:700;color:var(–g);text-shadow:0 0 8px var(–g);letter-spacing:1px;min-width:60px;text-align:center;}

/* Canvas */
#canvas-wrap{position:relative;flex:1;width:100%;overflow:hidden;display:flex;align-items:stretch;}
canvas{display:block;width:100%;height:100%;}

/* Overlay */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
justify-content:center;background:rgba(2,0,16,.93);z-index:50;gap:20px;padding:24px;}
.overlay-title{font-size:clamp(38px,13vw,64px);font-weight:900;letter-spacing:6px;color:var(–c);
text-shadow:0 0 20px var(–c),0 0 50px rgba(0,245,255,.3);text-align:center;line-height:1.1;}
.overlay-sub{font-family:‘Share Tech Mono’,monospace;font-size:clamp(10px,3vw,13px);
letter-spacing:3px;color:rgba(0,245,255,.6);text-align:center;}
.start-btn{background:rgba(0,245,255,.07);border:2px solid var(–c);color:var(–c);
font-family:‘Orbitron’,monospace;font-size:clamp(12px,3.5vw,15px);font-weight:700;letter-spacing:5px;
padding:16px 40px;cursor:pointer;text-transform:uppercase;
box-shadow:0 0 20px rgba(0,245,255,.15);clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
-webkit-tap-highlight-color:transparent;min-height:54px;min-width:180px;}
.high-score-note{font-family:‘Share Tech Mono’,monospace;font-size:11px;letter-spacing:3px;
color:var(–g);text-shadow:0 0 8px var(–g);}

/* Mobile controls */
#mobile-controls{width:100%;display:flex;align-items:center;justify-content:space-between;
padding:8px 16px;gap:10px;flex-shrink:0;background:rgba(0,0,8,.7);
border-top:1px solid rgba(0,245,255,.1);}

/* D-pad cross */
#dpad{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(3,56px);gap:4px;}
.dir-btn{width:56px;height:56px;background:rgba(0,245,255,.07);border:1.5px solid rgba(0,245,255,.2);
border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;
color:rgba(0,245,255,.6);cursor:pointer;-webkit-tap-highlight-color:transparent;
touch-action:none;user-select:none;}
.dir-btn.pressed{background:rgba(0,245,255,.2);border-color:rgba(0,245,255,.45);}
.dpad-blank{width:56px;height:56px;} /* corner filler */

/* Pause */
#ctrl-center{display:flex;flex-direction:column;align-items:center;gap:4px;}
#pause-btn{width:38px;height:38px;background:rgba(0,245,255,.05);border:1px solid rgba(0,245,255,.18);
border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;
color:rgba(0,245,255,.4);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ctrl-hint{font-family:‘Share Tech Mono’,monospace;font-size:7px;letter-spacing:1px;
color:rgba(0,245,255,.22);text-align:center;}

/* Fire */
#fire-btn{width:86px;height:86px;background:rgba(255,0,110,.09);border:2px solid rgba(255,0,110,.38);
border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
font-family:‘Orbitron’,monospace;font-size:9px;font-weight:700;letter-spacing:2px;color:var(–p);
text-shadow:0 0 8px var(–p);cursor:pointer;-webkit-tap-highlight-color:transparent;
touch-action:none;user-select:none;
box-shadow:0 0 18px rgba(255,0,110,.12),inset 0 0 16px rgba(255,0,110,.04);gap:2px;}
#fire-btn .fi{font-size:26px;}
#fire-btn.pressed{background:rgba(255,0,110,.22);box-shadow:0 0 30px rgba(255,0,110,.4);}
</style>

</head>
<body>

<div id="hud">
  <div>
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="score-hud">000000</div>
  </div>
  <div style="text-align:center">
    <div class="hud-label">LEVEL</div>
    <div class="hud-value" id="level-hud">01</div>
  </div>
  <div style="text-align:center">
    <div class="hud-label">ALLIES</div>
    <div id="ally-hud">－</div>
  </div>
  <div style="text-align:right">
    <div class="hud-label">LIVES</div>
    <div id="lives-display">
      <svg class="life-icon" id="l1" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
      <svg class="life-icon" id="l2" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
      <svg class="life-icon" id="l3" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
    </div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="overlay">
    <div class="overlay-title">STAR<br>BLAST</div>
    <div class="overlay-sub">── ARCADE SHOOTER ──</div>
    <button class="start-btn" id="start-btn">START GAME</button>
    <div class="overlay-sub" style="font-size:9px;margin-top:4px;line-height:1.9">
      十字ボタンで上下左右移動<br>
      FIREで5方向弾を発射<br>
      <span style="color:#39ff14">★ まれに敵が味方に寝返る！</span>
    </div>
  </div>
</div>

<!-- Mobile controls: cross d-pad + fire -->

<div id="mobile-controls">
  <!-- Cross d-pad -->
  <div id="dpad">
    <div class="dpad-blank"></div>
    <div class="dir-btn" id="up-btn">▲</div>
    <div class="dpad-blank"></div>
    <div class="dir-btn" id="left-btn">◀</div>
    <div class="dpad-blank"></div>
    <div class="dir-btn" id="right-btn">▶</div>
    <div class="dpad-blank"></div>
    <div class="dir-btn" id="down-btn">▼</div>
    <div class="dpad-blank"></div>
  </div>

  <div id="ctrl-center">
    <div id="pause-btn">⏸</div>
    <div class="ctrl-hint">PAUSE</div>
  </div>

  <div id="fire-btn">
    <span class="fi">●</span>
    <span>FIRE</span>
  </div>
</div>

<script>
// ── Canvas / DPR ─────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');
let W=0, H=0, scale=1;

function resizeCanvas(){
  const dpr = Math.min(window.devicePixelRatio||1, 3);
  W = wrap.clientWidth; H = wrap.clientHeight;
  canvas.width  = Math.round(W*dpr); canvas.height = Math.round(H*dpr);
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  scale = Math.min(W/390, H/600);
  if(stars.length) initStars();
  if(state==='play'||state==='pause'){
    player.x = Math.max(20, Math.min(player.x||W/2, W-20));
    player.y = Math.max(20, Math.min(player.y||H*0.75, H-20));
  }
}

// ── State ─────────────────────────────────────────────────────
let state='title', score=0, hiScore=0, lives=3, level=1, frameCount=0;
const player = {x:0, y:0, invincible:0};

let bullets=[], enemyBullets=[], enemies=[], allies=[], particles=[], powerups=[], stars=[];
let lastShot=0, nextSpawn=140;
const SHOT_CD = 160; // slightly faster fire

// ── Input ─────────────────────────────────────────────────────
const keys={};
let mLeft=false, mRight=false, mUp=false, mDown=false, mFire=false;

document.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(e.code==='Space') e.preventDefault();
  if(e.code==='KeyP') togglePause();
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });

function addTouch(el, setter){
  const on=()=>{ el.classList.add('pressed'); setter(true); };
  const off=()=>{ el.classList.remove('pressed'); setter(false); };
  el.addEventListener('touchstart', e=>{ e.preventDefault(); on(); }, {passive:false});
  el.addEventListener('touchend',   e=>{ e.preventDefault(); off(); }, {passive:false});
  el.addEventListener('touchcancel',e=>{ e.preventDefault(); off(); }, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
  el.addEventListener('mouseleave',off);
}
addTouch(document.getElementById('left-btn'),  v=>mLeft=v);
addTouch(document.getElementById('right-btn'), v=>mRight=v);
addTouch(document.getElementById('up-btn'),    v=>mUp=v);
addTouch(document.getElementById('down-btn'),  v=>mDown=v);
addTouch(document.getElementById('fire-btn'),  v=>mFire=v);

document.getElementById('pause-btn').addEventListener('touchstart', e=>{ e.preventDefault(); togglePause(); }, {passive:false});
document.getElementById('pause-btn').addEventListener('click', togglePause);

// Drag-to-move on canvas
let dragX=null, dragY=null;
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); if(state!=='play') return; dragX=e.touches[0].clientX; dragY=e.touches[0].clientY; }, {passive:false});
canvas.addEventListener('touchmove',  e=>{ e.preventDefault(); if(state!=='play'||dragX===null) return;
  player.x=Math.max(18*scale, Math.min(W-18*scale, player.x+(e.touches[0].clientX-dragX)));
  player.y=Math.max(18*scale, Math.min(H-18*scale, player.y+(e.touches[0].clientY-dragY)));
  dragX=e.touches[0].clientX; dragY=e.touches[0].clientY;
}, {passive:false});
canvas.addEventListener('touchend',   e=>{ e.preventDefault(); dragX=dragY=null; }, {passive:false});
canvas.addEventListener('touchcancel',e=>{ e.preventDefault(); dragX=dragY=null; }, {passive:false});

// ── Stars ─────────────────────────────────────────────────────
function initStars(){
  stars=Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,spd:Math.random()*1.1+.3,a:.3+Math.random()*.7}));
}
function updateStars(){ stars.forEach(s=>{ s.y+=s.spd*(1+level*.07); if(s.y>H){s.y=0;s.x=Math.random()*W;} }); }
function drawStars(){ stars.forEach(s=>{ ctx.fillStyle=`rgba(200,230,255,${s.a})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); }); }
function drawGrid(){ ctx.strokeStyle='rgba(0,245,255,.04)'; ctx.lineWidth=.5; const g=50*scale; for(let x=0;x<W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();} for(let y=0;y<H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();} }

// ── Player draw ───────────────────────────────────────────────
function drawPlayer(){
  if(player.invincible>0&&Math.floor(frameCount/4)%2===0) return;
  const x=player.x, y=player.y, s=scale;
  ctx.save();
  ctx.shadowBlur=18; ctx.shadowColor='#00f5ff'; ctx.fillStyle='#00f5ff';
  ctx.beginPath();
  ctx.moveTo(x,y-18*s); ctx.lineTo(x-14*s,y+12*s); ctx.lineTo(x-6*s,y+6*s);
  ctx.lineTo(x,y+14*s); ctx.lineTo(x+6*s,y+6*s); ctx.lineTo(x+14*s,y+12*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#020010'; ctx.beginPath(); ctx.ellipse(x,y-2*s,5*s,8*s,0,0,Math.PI*2); ctx.fill();
  const fH=(8+Math.sin(frameCount*.3)*4)*s;
  const fg=ctx.createLinearGradient(x,y+14*s,x,y+14*s+fH);
  fg.addColorStop(0,'rgba(255,214,10,.9)'); fg.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(x-4*s,y+14*s); ctx.lineTo(x,y+14*s+fH); ctx.lineTo(x+4*s,y+14*s); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── Ally draw (captured enemy — glows green) ──────────────────
function drawAlly(a){
  ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.angle||0);
  ctx.shadowBlur=16; ctx.shadowColor='#39ff14';
  ctx.fillStyle='#39ff14'; ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
  // Diamond shape
  ctx.beginPath(); ctx.moveTo(0,-a.r); ctx.lineTo(a.r*.7,0); ctx.lineTo(0,a.r); ctx.lineTo(-a.r*.7,0); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Timer ring
  const prog=a.timer/a.maxTimer;
  ctx.strokeStyle=`rgba(57,255,20,${prog*0.8+0.2})`; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,0,a.r+5,-(Math.PI/2),(-(Math.PI/2))+(Math.PI*2*prog)); ctx.stroke();
  ctx.restore();
}

// ── Enemy draw ────────────────────────────────────────────────
const EC=['#ff006e','#ff9500','#bf5af2','#39ff14'];
function drawEnemy(e){
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.angle||0);
  ctx.shadowBlur=13; ctx.shadowColor=e.color; ctx.fillStyle=e.color; ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1;
  switch(e.type){
    case 0: ctx.beginPath(); ctx.moveTo(0,-e.r); ctx.lineTo(e.r*.7,0); ctx.lineTo(0,e.r); ctx.lineTo(-e.r*.7,0); ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 1: ctx.beginPath(); for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i-Math.PI/8; i===0?ctx.moveTo(Math.cos(a)*e.r,Math.sin(a)*e.r):ctx.lineTo(Math.cos(a)*e.r,Math.sin(a)*e.r);} ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 2: ctx.beginPath(); ctx.moveTo(0,-e.r); ctx.lineTo(e.r,e.r*.7); ctx.lineTo(-e.r,e.r*.7); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.fillStyle='rgba(255,255,255,.3)'; ctx.beginPath(); ctx.arc(0,0,e.r*.32,0,Math.PI*2); ctx.fill(); break;
    case 3: ctx.beginPath(); for(let i=0;i<10;i++){const a=(Math.PI*2/10)*i-Math.PI/2,r=i%2===0?e.r:e.r*.45; i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);} ctx.closePath(); ctx.fill(); ctx.stroke(); break;
  }
  if(e.maxHp>1){ const bw=e.r*2.4; ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(-bw/2,e.r+5,bw,4); ctx.fillStyle=e.hp/e.maxHp>.5?'#39ff14':e.hp/e.maxHp>.25?'#ffd60a':'#ff006e'; ctx.fillRect(-bw/2,e.r+5,bw*(e.hp/e.maxHp),4); }
  ctx.restore();
}

// ── Particles ─────────────────────────────────────────────────
function spawnBoom(x,y,color,n=16){
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,sp=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:Math.random()*3+1,life:1,decay:Math.random()*.04+.02,color}); }
}
function updateParticles(){ particles=particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.06; p.life-=p.decay; return p.life>0; }); }
function drawParticles(){
  particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowBlur=5; ctx.shadowColor=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ── Power-ups ─────────────────────────────────────────────────
function drawPowerup(p){
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(frameCount*.05);
  ctx.shadowBlur=18; ctx.shadowColor=p.color; ctx.strokeStyle=p.color; ctx.lineWidth=2;
  const sz=9*scale; ctx.strokeRect(-sz,-sz,sz*2,sz*2);
  ctx.fillStyle=p.color; ctx.font=`bold ${Math.round(12*scale)}px Orbitron`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(p.icon,0,0); ctx.restore();
}

// ── Spawn enemies ─────────────────────────────────────────────
function spawnWave(){
  const isBoss=level%6===0&&enemies.length===0&&frameCount>200;
  if(isBoss){
    enemies.push({x:W/2,y:H*.1,vx:1.0,vy:.25,type:2,r:32*scale,color:'#ffd60a',
      hp:15+level*3,maxHp:15+level*3,score:500+level*40,isBoss:true});
    return;
  }
  // Fewer cols, slower speed → easier
  const cols=Math.min(2+level,6);
  const type=level>=5?Math.floor(Math.random()*4):Math.floor(Math.random()*2);
  const color=EC[type%EC.length];
  for(let i=0;i<cols;i++){
    const margin=40, sp=(W-margin*2)/Math.max(cols-1,1);
    enemies.push({
      x:margin+i*sp, y:-28-i*4,
      vx:(Math.random()-.5)*(0.7+level*.13),  // slower horizontal
      vy:0.5+level*.09+Math.random()*.28,      // slower descent
      type:type%2, r:(13+Math.floor(Math.random()*5))*scale,
      color, hp:1+Math.floor(level/5), maxHp:1+Math.floor(level/5),
      score:100+level*10, angle:0, angleV:(Math.random()-.5)*.04
    });
  }
}

function updateEnemies(){
  enemies.forEach(e=>{
    e.x+=e.vx; e.y+=e.vy;
    if(e.angle!==undefined) e.angle+=e.angleV;
    if(e.x<e.r||e.x>W-e.r) e.vx*=-1;
    if(e.isBoss){
      if(e.x<player.x-5) e.vx+=.03; if(e.x>player.x+5) e.vx-=.03;
      e.vx=Math.max(-2.5,Math.min(2.5,e.vx));
      if(e.y>H*.24) e.vy=-.3; if(e.y<H*.06) e.vy=.3;
    }
    // Less frequent enemy fire
    if(Math.random()<.002+level*.0003){
      const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      enemyBullets.push({x:e.x,y:e.y,vx:(dx/d)*(1.8+level*.1),vy:(dy/d)*(1.8+level*.1),color:e.color});
    }
  });
  enemies=enemies.filter(e=>e.y<H+60);
}

// ── Allies (converted enemies) ────────────────────────────────
// Each ally orbits near the player and auto-fires at enemies
let allyShot=0;
const ALLY_SHOT_CD=400;

function updateAllies(now){
  const maxTimer=480; // ~8 seconds at 60fps
  allies=allies.filter(a=>{
    // Orbit around player
    a.orbitAngle=(a.orbitAngle||0)+.04;
    const orbitR=50*scale*(1+a.orbitIdx*.6);
    a.x=player.x+Math.cos(a.orbitAngle+a.orbitOffset)*orbitR;
    a.y=player.y+Math.sin(a.orbitAngle+a.orbitOffset)*orbitR*0.6;
    a.angle+=.06;
    a.timer--;
    return a.timer>0;
  });

  // Ally fires at nearest enemy
  if(allies.length>0 && now-allyShot>ALLY_SHOT_CD/Math.max(allies.length,.5)){
    allies.forEach(a=>{
      let nearest=null, nd=Infinity;
      enemies.forEach(e=>{ const d=Math.sqrt((e.x-a.x)**2+(e.y-a.y)**2); if(d<nd){nd=d;nearest=e;} });
      if(nearest){
        const dx=nearest.x-a.x,dy=nearest.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        allyBullets.push({x:a.x,y:a.y,vx:(dx/d)*9,vy:(dy/d)*9});
      }
    });
    allyShot=now;
  }
}

// Ally bullet array
let allyBullets=[];

function updateAllyBullets(){
  allyBullets=allyBullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20; });
}

function drawAllyBullets(){
  allyBullets.forEach(b=>{
    ctx.save(); ctx.shadowBlur=10; ctx.shadowColor='#39ff14'; ctx.fillStyle='#39ff14';
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

function checkAllyBullets(){
  allyBullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(Math.sqrt((b.x-e.x)**2+(b.y-e.y)**2)<e.r+3){
        e.hp--; allyBullets.splice(bi,1); spawnBoom(b.x,b.y,e.color,4);
        if(e.hp<=0){ score+=e.score; spawnBoom(e.x,e.y,e.color,e.isBoss?60:18); enemies.splice(ei,1); updateHUD();
          if(score>0&&score%500<e.score){level++;updateHUD();}
        }
      }
    });
  });
}

// ── Player bullets ────────────────────────────────────────────
function updateBullets(){
  const sp=9+level*.35;
  // Each bullet has its own angle for fan spread
  bullets=bullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20; });
  enemyBullets=enemyBullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10; });
}

function drawBullets(){
  bullets.forEach(b=>{
    ctx.save(); ctx.shadowBlur=10; ctx.shadowColor='#00f5ff';
    ctx.fillStyle='#fff';
    // Draw as a short line in the direction of travel
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(Math.atan2(b.vy,b.vx)+Math.PI/2);
    ctx.fillRect(-2,-7,4,14); ctx.restore();
    ctx.restore();
  });
  enemyBullets.forEach(b=>{
    ctx.save(); ctx.shadowBlur=8; ctx.shadowColor=b.color; ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

// 5-WAY spread shot — always, from level 1
function tryShoot(now){
  if(now-lastShot>SHOT_CD){
    const s=scale;
    const spd=10+level*.3;
    // 5 directions: straight up + 2 angled + 2 side-angled
    const angles=[-Math.PI/2, -Math.PI/2-0.28, -Math.PI/2+0.28, -Math.PI/2-0.55, -Math.PI/2+0.55];
    angles.forEach(a=>{
      bullets.push({x:player.x,y:player.y-14*s,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd});
    });
    lastShot=now;
  }
}

// ── Collision ─────────────────────────────────────────────────
function checkCollisions(now){
  const hr=14*scale;
  // Player bullets vs enemies
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(Math.sqrt((b.x-e.x)**2+(b.y-e.y)**2)<e.r+3){
        e.hp--; bullets.splice(bi,1); spawnBoom(b.x,b.y,e.color,5);

        // ── ALLY CONVERSION: 8% chance on first hit damage ──
        if(!e._triedConvert && !e.isBoss && Math.random()<0.08){
          e._triedConvert=true;
          // Flash effect
          spawnBoom(e.x,e.y,'#39ff14',20);
          // Convert to ally
          const maxT=480;
          allies.push({
            x:e.x, y:e.y,
            r:e.r, angle:0,
            orbitAngle:Math.random()*Math.PI*2,
            orbitOffset:(allies.length/(allies.length+1))*Math.PI*2,
            orbitIdx:allies.length,
            timer:maxT, maxTimer:maxT
          });
          enemies.splice(ei,1);
          updateHUD(); updateAllyHUD();
          return;
        }

        if(e.hp<=0){
          score+=e.score; spawnBoom(e.x,e.y,e.color,e.isBoss?60:18);
          if(Math.random()<.2) powerups.push({x:e.x,y:e.y,vy:1.2,type:'life',color:'#ff006e',icon:'♥'});
          enemies.splice(ei,1); updateHUD();
          if(score>0&&score%500<e.score){level++;updateHUD();}
        }
      }
    });
  });

  // Enemy bullets / bodies vs player
  if(player.invincible<=0){
    enemyBullets.forEach((b,bi)=>{
      if(Math.sqrt((b.x-player.x)**2+(b.y-player.y)**2)<hr){ enemyBullets.splice(bi,1); hitPlayer(); }
    });
    enemies.forEach((e,ei)=>{
      if(Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2)<e.r+hr*.7){ spawnBoom(e.x,e.y,e.color,30); enemies.splice(ei,1); hitPlayer(); }
    });
  }

  // Power-ups
  powerups=powerups.filter(p=>{
    p.y+=p.vy;
    if(Math.sqrt((p.x-player.x)**2+(p.y-player.y)**2)<22*scale){
      if(p.type==='life'&&lives<3){lives++;updateHUD();}
      spawnBoom(p.x,p.y,p.color,10); return false;
    }
    return p.y<H+20;
  });
}

function hitPlayer(){
  spawnBoom(player.x,player.y,'#00f5ff',28);
  lives--; player.invincible=120; updateHUD();
  if(lives<=0){ state='gameover'; if(score>hiScore)hiScore=score; showGameOver(); }
}

// ── HUD helpers ───────────────────────────────────────────────
function updateHUD(){
  document.getElementById('score-hud').textContent=String(score).padStart(6,'0');
  document.getElementById('level-hud').textContent=String(level).padStart(2,'0');
  ['l1','l2','l3'].forEach((id,i)=>document.getElementById(id).classList.toggle('dead',i>=lives));
  updateAllyHUD();
}
function updateAllyHUD(){
  const el=document.getElementById('ally-hud');
  el.textContent=allies.length>0?'×'+allies.length:'－';
}

// ── Overlay ───────────────────────────────────────────────────
const overlayEl=document.getElementById('overlay');
function showOverlay(html){
  overlayEl.innerHTML=html; overlayEl.style.display='flex';
  const btn=document.getElementById('start-btn');
  if(btn){
    btn.addEventListener('click',handleStartBtn);
    btn.addEventListener('touchstart',e=>{e.preventDefault();handleStartBtn();},{passive:false});
  }
}
function hideOverlay(){ overlayEl.style.display='none'; }

function showGameOver(){
  const hi=score>=hiScore?`<div class="high-score-note">★ NEW HIGH SCORE ★</div>`:'';
  showOverlay(`<div class="overlay-title">GAME<br>OVER</div>
    <div class="overlay-sub">SCORE: <span style="color:var(--y)">${String(score).padStart(6,'0')}</span></div>
    ${hi}<button class="start-btn" id="start-btn">PLAY AGAIN</button>`);
}

function togglePause(){
  if(state==='play'){ state='pause';
    showOverlay(`<div class="overlay-title" style="font-size:clamp(28px,10vw,46px)">PAUSED</div>
      <button class="start-btn" id="start-btn">RESUME</button>`);
  } else if(state==='pause'){ state='play'; hideOverlay(); }
}

function handleStartBtn(){
  if(state==='gameover'||state==='title') startGame();
  else if(state==='pause'){ state='play'; hideOverlay(); }
}

document.getElementById('start-btn').addEventListener('click',handleStartBtn);
document.getElementById('start-btn').addEventListener('touchstart',e=>{e.preventDefault();handleStartBtn();},{passive:false});

function startGame(){
  score=0; lives=3; level=1; frameCount=0;
  bullets=[]; enemyBullets=[]; allyBullets=[]; enemies=[]; allies=[]; particles=[]; powerups=[];
  player.x=W/2; player.y=H*.72; player.invincible=0;
  nextSpawn=140; lastShot=0; allyShot=0;
  hideOverlay(); updateHUD(); state='play';
}

// ── Main loop ─────────────────────────────────────────────────
let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  ctx.fillStyle='#020010'; ctx.fillRect(0,0,W,H);
  drawGrid(); updateStars(); drawStars();

  if(state==='title') return;
  if(state==='pause'||state==='gameover'){
    drawParticles(); allies.forEach(drawAlly); enemies.forEach(drawEnemy);
    drawAllyBullets(); drawBullets(); drawPlayer(); powerups.forEach(drawPowerup); return;
  }
  if(state!=='play') return;

  frameCount++;

  // ── Player movement (4-direction, softer boundary) ──
  const spd=(3.5+level*.12)*scale;
  if((keys['ArrowLeft'] ||keys['KeyA']||mLeft)  && player.x>18*scale)    player.x-=spd;
  if((keys['ArrowRight']||keys['KeyD']||mRight) && player.x<W-18*scale)  player.x+=spd;
  if((keys['ArrowUp']   ||keys['KeyW']||mUp)    && player.y>18*scale)    player.y-=spd;
  if((keys['ArrowDown'] ||keys['KeyS']||mDown)  && player.y<H-18*scale)  player.y+=spd;

  if(player.invincible>0) player.invincible--;
  if(keys['Space']||keys['KeyZ']||mFire) tryShoot(now);

  if(frameCount>=nextSpawn){ spawnWave(); nextSpawn=frameCount+Math.max(60,155-level*7); }

  updateBullets();
  updateEnemies();
  updateAllies(now);
  updateAllyBullets();
  checkCollisions(now);
  checkAllyBullets();
  updateParticles();
  updateAllyHUD();

  // Draw
  drawParticles();
  powerups.forEach(drawPowerup);
  allies.forEach(drawAlly);
  enemies.forEach(drawEnemy);
  drawAllyBullets();
  drawBullets();
  drawPlayer();

  // Hit flash
  if(player.invincible>100){ ctx.fillStyle='rgba(255,0,110,.09)'; ctx.fillRect(0,0,W,H); }

  // Ally conversion flash label (show above converted ally)
  // (handled by spawnBoom particles)
}

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('resize',      ()=>resizeCanvas());
window.addEventListener('orientationchange',()=>setTimeout(resizeCanvas,300));

resizeCanvas();
initStars();
requestAnimationFrame(loop);
</script>
