<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STARBLAST">
<title>STARBLAST</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffd60a;
    --neon-green: #39ff14;
    --bg-dark: #020010;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-dark);
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Orbitron', monospace;
    color: var(--neon-cyan);
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 200;
  }

  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 20px 5px;
    background: rgba(0,245,255,0.04);
    border-bottom: 1px solid rgba(0,245,255,0.12);
    flex-shrink: 0;
  }

  .hud-label { font-size: 8px; letter-spacing: 3px; color: rgba(0,245,255,0.4); }
  .hud-value { font-size: 20px; font-weight: 900; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); letter-spacing: 1px; }

  #lives-display { display: flex; gap: 5px; align-items: center; }
  .life-icon { width: 16px; height: 16px; fill: var(--neon-pink); filter: drop-shadow(0 0 3px var(--neon-pink)); }
  .life-icon.dead { opacity: 0.12; }

  #canvas-wrap {
    position: relative;
    flex: 1;
    width: 100%;
    overflow: hidden;
    display: flex;
    align-items: stretch;
  }

  canvas { display: block; width: 100%; height: 100%; }

  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(2,0,16,0.93);
    z-index: 50; gap: 20px; padding: 24px;
  }

  .overlay-title {
    font-size: clamp(38px, 13vw, 64px);
    font-weight: 900; letter-spacing: 6px;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 50px rgba(0,245,255,0.3);
    text-align: center; line-height: 1.1;
  }

  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 3vw, 13px);
    letter-spacing: 3px; color: rgba(0,245,255,0.6); text-align: center;
  }

  .start-btn {
    background: rgba(0,245,255,0.07);
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 3.5vw, 15px);
    font-weight: 700; letter-spacing: 5px;
    padding: 16px 40px; cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,245,255,0.15);
    clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
    -webkit-tap-highlight-color: transparent;
    min-height: 54px; min-width: 180px;
  }

  .high-score-note {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green);
  }

  #mobile-controls {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    gap: 12px;
    flex-shrink: 0;
    background: rgba(0,0,8,0.7);
    border-top: 1px solid rgba(0,245,255,0.1);
  }

  #dpad { display: flex; gap: 10px; }

  .dir-btn {
    width: 68px; height: 68px;
    background: rgba(0,245,255,0.07);
    border: 1.5px solid rgba(0,245,255,0.22);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: rgba(0,245,255,0.65);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; user-select: none;
  }
  .dir-btn.pressed { background: rgba(0,245,255,0.18); border-color: rgba(0,245,255,0.45); }

  #ctrl-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  #pause-btn {
    width: 38px; height: 38px;
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.18);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: rgba(0,245,255,0.4);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .ctrl-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px; letter-spacing: 1px;
    color: rgba(0,245,255,0.25); text-align: center;
  }

  #fire-btn {
    width: 84px; height: 84px;
    background: rgba(255,0,110,0.09);
    border: 2px solid rgba(255,0,110,0.38);
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    color: var(--neon-pink);
    text-shadow: 0 0 8px var(--neon-pink);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none; user-select: none;
    box-shadow: 0 0 18px rgba(255,0,110,0.12), inset 0 0 16px rgba(255,0,110,0.04);
    gap: 2px;
  }
  #fire-btn .fi { font-size: 26px; }
  #fire-btn.pressed { background: rgba(255,0,110,0.22); box-shadow: 0 0 30px rgba(255,0,110,0.4); }
</style>
</head>
<body>

<div id="hud">
  <div>
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="score-hud">000000</div>
  </div>
  <div style="text-align:center">
    <div class="hud-label">LEVEL</div>
    <div class="hud-value" id="level-hud">01</div>
  </div>
  <div style="text-align:right">
    <div class="hud-label">LIVES</div>
    <div id="lives-display">
      <svg class="life-icon" id="l1" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
      <svg class="life-icon" id="l2" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
      <svg class="life-icon" id="l3" viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
    </div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="overlay">
    <div class="overlay-title">STAR<br>BLAST</div>
    <div class="overlay-sub">── ARCADE SHOOTER ──</div>
    <button class="start-btn" id="start-btn">START GAME</button>
    <div class="overlay-sub" style="font-size:9px;margin-top:4px;line-height:1.8">
      ◀ ▶ で移動 &nbsp;●&nbsp; FIRE で発射<br>
      画面をドラッグして操作もOK
    </div>
  </div>
</div>

<div id="mobile-controls">
  <div id="dpad">
    <div class="dir-btn" id="left-btn">◀</div>
    <div class="dir-btn" id="right-btn">▶</div>
  </div>
  <div id="ctrl-center">
    <div id="pause-btn">⏸</div>
    <div class="ctrl-hint">PAUSE</div>
  </div>
  <div id="fire-btn">
    <span class="fi">●</span>
    <span>FIRE</span>
  </div>
</div>

<script>
// ── Canvas / DPR setup ───────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

let W = 0, H = 0, scale = 1;

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scale = Math.min(W / 390, H / 600);
  if (stars.length) initStars();
  if (state === 'play' || state === 'pause') {
    player.y = H - 70 * scale;
    player.x = Math.min(player.x || W/2, W - 20);
  }
}

// ── Game state ───────────────────────────────────────────────
let state = 'title';
let score = 0, hiScore = 0, lives = 3, level = 1, frameCount = 0;
const player = { x: 0, y: 0, invincible: 0 };
let bullets = [], enemyBullets = [], enemies = [], particles = [], powerups = [], stars = [];
let lastShot = 0, nextSpawn = 120;
const SHOT_CD = 175;

// ── Input ────────────────────────────────────────────────────
const keys = {};
let mLeft = false, mRight = false, mFire = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyP') togglePause();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function addTouch(el, id, setL, setR) {
  const down = () => { el.classList.add('pressed'); setL(true); };
  const up   = () => { el.classList.remove('pressed'); setL(false); };
  el.addEventListener('touchstart',  e => { e.preventDefault(); down(); }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); up();   }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); up();   }, { passive: false });
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup',   up);
  el.addEventListener('mouseleave',up);
}

addTouch(document.getElementById('left-btn'),  'l', v => mLeft  = v);
addTouch(document.getElementById('right-btn'), 'r', v => mRight = v);
addTouch(document.getElementById('fire-btn'),  'f', v => mFire  = v);

document.getElementById('pause-btn').addEventListener('touchstart', e => { e.preventDefault(); togglePause(); }, { passive: false });
document.getElementById('pause-btn').addEventListener('click', togglePause);

// Canvas drag-to-move
let dragX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'play') return;
  dragX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'play' || dragX === null) return;
  const dx = e.touches[0].clientX - dragX;
  dragX = e.touches[0].clientX;
  player.x = Math.max(18*scale, Math.min(W - 18*scale, player.x + dx));
}, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); dragX = null; }, { passive: false });
canvas.addEventListener('touchcancel',e => { e.preventDefault(); dragX = null; }, { passive: false });

// ── Stars ────────────────────────────────────────────────────
function initStars() {
  stars = Array.from({ length: 100 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.3 + 0.2,
    speed: Math.random() * 1.1 + 0.3,
    a: 0.3 + Math.random() * 0.7,
  }));
}
function updateStars() {
  stars.forEach(s => {
    s.y += s.speed * (1 + level * 0.07);
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });
}
function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = `rgba(200,230,255,${s.a})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
}
function drawGrid() {
  ctx.strokeStyle = 'rgba(0,245,255,0.04)'; ctx.lineWidth = 0.5;
  const g = 50 * scale;
  for (let x = 0; x < W; x += g) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += g) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

// ── Player draw ──────────────────────────────────────────────
function drawPlayer() {
  if (player.invincible > 0 && Math.floor(frameCount/4)%2===0) return;
  const x = player.x, y = player.y, s = scale;
  ctx.save();
  ctx.shadowBlur = 18; ctx.shadowColor = '#00f5ff';
  ctx.fillStyle = '#00f5ff';
  ctx.beginPath();
  ctx.moveTo(x,       y-18*s);
  ctx.lineTo(x-14*s, y+12*s); ctx.lineTo(x-6*s, y+6*s);
  ctx.lineTo(x,      y+14*s);
  ctx.lineTo(x+6*s,  y+6*s);  ctx.lineTo(x+14*s, y+12*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#020010';
  ctx.beginPath(); ctx.ellipse(x, y-2*s, 5*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
  const fH = (8+Math.sin(frameCount*0.3)*4)*s;
  const fg = ctx.createLinearGradient(x, y+14*s, x, y+14*s+fH);
  fg.addColorStop(0,'rgba(255,214,10,0.9)'); fg.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.moveTo(x-4*s, y+14*s); ctx.lineTo(x, y+14*s+fH); ctx.lineTo(x+4*s, y+14*s); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── Enemy draw ───────────────────────────────────────────────
const EC = ['#ff006e','#ff9500','#bf5af2','#39ff14'];
function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.angle||0);
  ctx.shadowBlur=13; ctx.shadowColor=e.color;
  ctx.fillStyle=e.color; ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
  switch(e.type) {
    case 0:
      ctx.beginPath(); ctx.moveTo(0,-e.r); ctx.lineTo(e.r*.7,0); ctx.lineTo(0,e.r); ctx.lineTo(-e.r*.7,0);
      ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 1:
      ctx.beginPath();
      for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i-Math.PI/8; i===0?ctx.moveTo(Math.cos(a)*e.r,Math.sin(a)*e.r):ctx.lineTo(Math.cos(a)*e.r,Math.sin(a)*e.r);}
      ctx.closePath(); ctx.fill(); ctx.stroke(); break;
    case 2:
      ctx.beginPath(); ctx.moveTo(0,-e.r); ctx.lineTo(e.r,e.r*.7); ctx.lineTo(-e.r,e.r*.7);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(0,0,e.r*.32,0,Math.PI*2); ctx.fill(); break;
    case 3:
      ctx.beginPath();
      for(let i=0;i<10;i++){const a=(Math.PI*2/10)*i-Math.PI/2,r=i%2===0?e.r:e.r*.45; i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
      ctx.closePath(); ctx.fill(); ctx.stroke(); break;
  }
  if(e.maxHp>1){const bw=e.r*2.4; ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(-bw/2,e.r+5,bw,4); ctx.fillStyle=e.hp/e.maxHp>.5?'#39ff14':e.hp/e.maxHp>.25?'#ffd60a':'#ff006e'; ctx.fillRect(-bw/2,e.r+5,bw*(e.hp/e.maxHp),4);}
  ctx.restore();
}

// ── Particles ────────────────────────────────────────────────
function spawnBoom(x,y,color,n=16){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:Math.random()*3+1,life:1,decay:Math.random()*.04+.02,color});}
}
function updateParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life-=p.decay;return p.life>0;});}
function drawParticles(){
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowBlur=5;ctx.shadowColor=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// ── Power-ups ────────────────────────────────────────────────
function drawPowerup(p){
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(frameCount*.05);
  ctx.shadowBlur=18;ctx.shadowColor=p.color;ctx.strokeStyle=p.color;ctx.lineWidth=2;
  const sz=9*scale;ctx.strokeRect(-sz,-sz,sz*2,sz*2);
  ctx.fillStyle=p.color;ctx.font=`bold ${Math.round(12*scale)}px Orbitron`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.icon,0,0);ctx.restore();
}

// ── Spawn ────────────────────────────────────────────────────
function spawnWave(){
  const isBoss=level%5===0&&enemies.length===0&&frameCount>200;
  if(isBoss){
    enemies.push({x:W/2,y:H*.1,vx:1.1,vy:.3,type:2,r:34*scale,color:'#ffd60a',hp:20+level*4,maxHp:20+level*4,score:500+level*50,isBoss:true});
    return;
  }
  const cols=Math.min(3+level,7),type=level>=5?Math.floor(Math.random()*4):Math.floor(Math.random()*2);
  const color=EC[type%EC.length];
  for(let i=0;i<cols;i++){
    const margin=40,sp=(W-margin*2)/Math.max(cols-1,1);
    enemies.push({x:margin+i*sp,y:-28-i*4,vx:(Math.random()-.5)*(1+level*.17),vy:.65+level*.11+Math.random()*.38,
      type:type%2,r:(13+Math.floor(Math.random()*5))*scale,color,
      hp:1+Math.floor(level/4),maxHp:1+Math.floor(level/4),score:100+level*10,angle:0,angleV:(Math.random()-.5)*.04});
  }
}

function updateEnemies(){
  enemies.forEach(e=>{
    e.x+=e.vx;e.y+=e.vy;
    if(e.angle!==undefined)e.angle+=e.angleV;
    if(e.x<e.r||e.x>W-e.r)e.vx*=-1;
    if(e.isBoss){
      if(e.x<player.x-5)e.vx+=.04;if(e.x>player.x+5)e.vx-=.04;
      e.vx=Math.max(-3,Math.min(3,e.vx));
      if(e.y>H*.26)e.vy=-.4;if(e.y<H*.07)e.vy=.4;
    }
    if(Math.random()<.003+level*.0004){
      const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      enemyBullets.push({x:e.x,y:e.y,vx:(dx/d)*(2+level*.12),vy:(dy/d)*(2+level*.12),color:e.color});
    }
  });
  enemies=enemies.filter(e=>e.y<H+60);
}

// ── Bullets ──────────────────────────────────────────────────
function updateBullets(){
  const sp=9+level*.4;
  bullets=bullets.filter(b=>{b.y-=sp;return b.y>-20;});
  enemyBullets=enemyBullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10;});
}
function drawBullets(){
  bullets.forEach(b=>{
    ctx.save();ctx.shadowBlur=10;ctx.shadowColor='#00f5ff';
    ctx.fillStyle='#fff';ctx.fillRect(b.x-2,b.y-7,4,14);
    ctx.fillStyle='rgba(0,245,255,.4)';ctx.fillRect(b.x-3,b.y,6,18);ctx.restore();
  });
  enemyBullets.forEach(b=>{
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor=b.color;ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}
function tryShoot(now){
  if(now-lastShot>SHOT_CD){
    const s=scale;
    bullets.push({x:player.x,y:player.y-18*s});
    if(level>=3){bullets.push({x:player.x-10*s,y:player.y-10*s});bullets.push({x:player.x+10*s,y:player.y-10*s});}
    lastShot=now;
  }
}

// ── Collision ────────────────────────────────────────────────
function checkCollisions(){
  const hr=14*scale;
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      const dx=b.x-e.x,dy=b.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<e.r+3){
        e.hp--;bullets.splice(bi,1);spawnBoom(b.x,b.y,e.color,5);
        if(e.hp<=0){
          score+=e.score;spawnBoom(e.x,e.y,e.color,e.isBoss?60:20);
          if(Math.random()<.22)powerups.push({x:e.x,y:e.y,vy:1.2,type:'life',color:'#ff006e',icon:'♥'});
          enemies.splice(ei,1);updateHUD();
          if(score>0&&score%500<e.score){level++;updateHUD();}
        }
      }
    });
  });
  if(player.invincible<=0){
    enemyBullets.forEach((b,bi)=>{
      if(Math.sqrt((b.x-player.x)**2+(b.y-player.y)**2)<hr){enemyBullets.splice(bi,1);hitPlayer();}
    });
    enemies.forEach((e,ei)=>{
      if(Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2)<e.r+hr*.7){spawnBoom(e.x,e.y,e.color,30);enemies.splice(ei,1);hitPlayer();}
    });
  }
  powerups=powerups.filter(p=>{
    p.y+=p.vy;
    if(Math.sqrt((p.x-player.x)**2+(p.y-player.y)**2)<22*scale){
      if(p.type==='life'&&lives<3){lives++;updateHUD();}spawnBoom(p.x,p.y,p.color,10);return false;
    }
    return p.y<H+20;
  });
}

function hitPlayer(){
  spawnBoom(player.x,player.y,'#00f5ff',28);lives--;player.invincible=120;updateHUD();
  if(lives<=0){state='gameover';if(score>hiScore)hiScore=score;showGameOver();}
}

// ── HUD ──────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('score-hud').textContent=String(score).padStart(6,'0');
  document.getElementById('level-hud').textContent=String(level).padStart(2,'0');
  ['l1','l2','l3'].forEach((id,i)=>document.getElementById(id).classList.toggle('dead',i>=lives));
}

// ── Overlay ──────────────────────────────────────────────────
const overlayEl=document.getElementById('overlay');
function showOverlay(html){
  overlayEl.innerHTML=html; overlayEl.style.display='flex';
  const btn=document.getElementById('start-btn');
  if(btn){
    btn.addEventListener('click',handleStartBtn);
    btn.addEventListener('touchstart',e=>{e.preventDefault();handleStartBtn();},{passive:false});
  }
}
function hideOverlay(){overlayEl.style.display='none';}

function showGameOver(){
  const hi=score>=hiScore?`<div class="high-score-note">★ NEW HIGH SCORE ★</div>`:'';
  showOverlay(`<div class="overlay-title">GAME<br>OVER</div>
    <div class="overlay-sub">SCORE: <span style="color:var(--neon-yellow)">${String(score).padStart(6,'0')}</span></div>
    ${hi}<button class="start-btn" id="start-btn">PLAY AGAIN</button>`);
}

function togglePause(){
  if(state==='play'){
    state='pause';
    showOverlay(`<div class="overlay-title" style="font-size:clamp(28px,10vw,46px)">PAUSED</div>
      <button class="start-btn" id="start-btn">RESUME</button>`);
  } else if(state==='pause'){state='play';hideOverlay();}
}

function handleStartBtn(){
  if(state==='gameover'||state==='title') startGame();
  else if(state==='pause'){state='play';hideOverlay();}
}

document.getElementById('start-btn').addEventListener('click',handleStartBtn);
document.getElementById('start-btn').addEventListener('touchstart',e=>{e.preventDefault();handleStartBtn();},{passive:false});

function startGame(){
  score=0;lives=3;level=1;frameCount=0;
  bullets=[];enemyBullets=[];enemies=[];particles=[];powerups=[];
  player.x=W/2;player.y=H-70*scale;player.invincible=0;
  nextSpawn=120;hideOverlay();updateHUD();state='play';
}

// ── Loop ─────────────────────────────────────────────────────
let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  lastTime=now;
  ctx.fillStyle='#020010';ctx.fillRect(0,0,W,H);
  drawGrid();updateStars();drawStars();

  if(state==='title') return;

  if(state==='pause'||state==='gameover'){
    drawParticles();enemies.forEach(drawEnemy);drawBullets();drawPlayer();powerups.forEach(drawPowerup);return;
  }
  if(state!=='play') return;

  frameCount++;
  const spd=(3.8+level*.14)*scale;
  if((keys['ArrowLeft']||keys['KeyA']||mLeft)&&player.x>18*scale)  player.x-=spd;
  if((keys['ArrowRight']||keys['KeyD']||mRight)&&player.x<W-18*scale) player.x+=spd;
  if(player.invincible>0) player.invincible--;
  if(keys['Space']||keys['KeyZ']||mFire) tryShoot(now);

  if(frameCount>=nextSpawn){spawnWave();nextSpawn=frameCount+Math.max(52,148-level*7);}

  updateBullets();updateEnemies();checkCollisions();updateParticles();
  drawParticles();enemies.forEach(drawEnemy);drawBullets();drawPlayer();powerups.forEach(drawPowerup);

  if(player.invincible>100){ctx.fillStyle='rgba(255,0,110,.09)';ctx.fillRect(0,0,W,H);}
}

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('resize',()=>{ resizeCanvas(); });
window.addEventListener('orientationchange',()=>{ setTimeout(resizeCanvas,300); });

resizeCanvas();
initStars();
requestAnimationFrame(loop);
</script>
</body>
