<!DOCTYPE html>
<html>
<head>
    <title>Simple Shooting Game</title>
    <style>
        body { margin: 0; background: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #000; border: 2px solid #555; display: block; }
        .info { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="info">方向キーで移動 / スペースキーでショット</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ゲーム設定
let score = 0;
let gameOver = false;

// プレイヤー
const player = { x: 180, y: 540, w: 40, h: 40, speed: 5 };
const bullets = [];
const enemies = [];
const keys = {};

// キー入力管理
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

// 敵の生成
function spawnEnemy() {
    if (Math.random() < 0.03) {
        enemies.push({ x: Math.random() * (canvas.width - 30), y: -30, w: 30, h: 30, speed: 2 + Math.random() * 2 });
    }
}

function update() {
    if (gameOver) return;

    // プレイヤー移動
    if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < canvas.width - player.w) player.x += player.speed;
    
    // 弾の発射
    if (keys["Space"] && bullets.length < 10) {
        if (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 20) {
            bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 10 });
        }
    }

    // 弾の移動
    bullets.forEach((b, i) => {
        b.y -= 7;
        if (b.y < 0) bullets.splice(i, 1);
    });

    // 敵の移動と衝突判定
    enemies.forEach((en, i) => {
        en.y += en.speed;
        if (en.y > canvas.height) enemies.splice(i, 1);

        // プレイヤーとの衝突
        if (en.x < player.x + player.w && en.x + en.w > player.x && en.y < player.y + player.h && en.y + en.h > player.y) {
            gameOver = true;
        }

        // 弾との衝突
        bullets.forEach((b, bi) => {
            if (en.x < b.x + b.w && en.x + en.w > b.x && en.y < b.y + b.h && en.y + en.h > b.y) {
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += 100;
            }
        });
    });

    spawnEnemy();
}

function draw() {
    // 画面クリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // プレイヤー描画 (青)
    ctx.fillStyle = "#00D2FF";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // 弾描画 (黄色)
    ctx.fillStyle = "#FFFF00";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // 敵描画 (赤)
    ctx.fillStyle = "#FF4136";
    enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));

    // スコア表示
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(`SCORE: ${score}`, 10, 30);

    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
        ctx.fillText("F5キーでリトライ", canvas.width/2, canvas.height/2 + 40);
    }

    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    update();
    draw();
}

gameLoop();
</script>
</body>
</html>
